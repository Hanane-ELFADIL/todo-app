<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-5">
    <!-- Section Authentification -->
    <div id="authSection" class="app-card p-4 shadow-lg rounded-4 mb-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold text-primary">Bienvenue</h1>
      </div>

      <!-- Formulaire Inscription -->
      <div id="registerForm" class="mb-4">
        <h5 class="mb-3">S'inscrire</h5>
        <div class="row g-3">
          <div class="col-md-4">
            <input id="regName" class="form-control" placeholder="Nom">
          </div>
          <div class="col-md-4">
            <input id="regEmail" type="email" class="form-control" placeholder="Email">
          </div>
          <div class="col-md-4">
            <input id="regPassword" type="password" class="form-control" placeholder="Mot de passe">
          </div>
        </div>
        <button id="registerBtn" class="btn btn-success w-100 mt-3">S'inscrire</button>
      </div>

      <!-- Formulaire Connexion -->
      <div id="loginForm">
        <h5 class="mb-3">Se connecter</h5>
        <input id="loginEmail" type="email" class="form-control mb-3" placeholder="Email">
        <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Mot de passe">
        <button id="loginBtn" class="btn btn-primary w-100 mb-3">Se connecter</button>
        <div id="authMessage" class="alert d-none"></div>
      </div>
    </div>

    <!-- Section TODO LIST (cachée au début) -->
    <div id="todoSection" class="app-card p-4 shadow-lg rounded-4 d-none">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mon To-Do List</h2>
        <div>
          <span id="userInfo" class="badge bg-info me-2"></span>
          <button id="logoutBtn" class="btn btn-outline-danger">Déconnexion</button>
        </div>
      </div>

      <!-- Ajout tâche -->
      <div class="row g-3 mb-3">
        <div class="col-md-5">
          <input id="taskInput" class="form-control" placeholder="Nouvelle tâche">
        </div>
        <div class="col-md-3">
          <select id="priorityInput" class="form-select">
            <option value="low">Basse</option>
            <option value="medium" selected>Moyenne</option>
            <option value="high">Haute</option>
          </select>
        </div>
        <div class="col-md-2">
          <input id="dateInput" type="date" class="form-control">
        </div>
        <div class="col-md-2">
          <button id="addBtn" class="btn btn-primary w-100">Ajouter</button>
        </div>
      </div>

      <!-- Filtres -->
      <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-outline-primary filter-btn active" data-filter="all">Toutes</button>
        <button class="btn btn-outline-primary filter-btn" data-filter="active">Actives</button>
        <button class="btn btn-outline-primary filter-btn" data-filter="done">Terminées</button>
      </div>

      <ul id="taskList" class="list-group"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
